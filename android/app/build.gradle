// ARR DMRV — Android app-level build.gradle
// Flutter Gradle plugin is applied via the settings.gradle flutterSdkPath approach.

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

// Release signing config — reads from env vars set in CI / local key.properties
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    compileSdkVersion 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "in.arrplatform.mobile"
        minSdkVersion 21               // Android 5.0 Lollipop — covers ~98% of active devices
        targetSdkVersion 34            // Android 14
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true           // needed for large dependency graph (drift + riverpod + maps)
    }

    signingConfigs {
        release {
            // Prefer key.properties file (local dev) then fall back to env vars (CI)
            keyAlias       keystoreProperties['keyAlias']       ?: System.getenv('KEY_ALIAS')
            keyPassword    keystoreProperties['keyPassword']    ?: System.getenv('KEY_PASSWORD')
            storeFile      keystoreProperties['storeFile']      ? file(keystoreProperties['storeFile']) :
                           System.getenv('KEYSTORE_FILE')       ? file(System.getenv('KEYSTORE_FILE')) : null
            storePassword  keystoreProperties['storePassword']  ?: System.getenv('KEYSTORE_PASSWORD')
        }
    }

    buildTypes {
        debug {
            debuggable true
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            // Signing config — falls back to debug signing if release keystore not provided
            signingConfig signingConfigs.release.storeFile != null
                ? signingConfigs.release
                : signingConfigs.debug
            // Keep minify off — Flutter tree-shakes Dart code; ProGuard on top causes issues
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    // AndroidX core for FileProvider support
    implementation 'androidx.core:core-ktx:1.12.0'
}
